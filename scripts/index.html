<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Genealogy Research Assistant</title>
</head>
<body>
<script>
/**
 * Genealogy Research Assistant — AI Edge Gallery JavaScript Skill
 *
 * Handles structured genealogy data: person records, family group sheets,
 * source citations, research logs, and GEDCOM export.
 * Data is persisted to Google Drive (appDataFolder) using OAuth credentials
 * stored in the skill secret.
 *
 * Secret format (JSON):
 *   {"client_id":"...","client_secret":"...","refresh_token":"..."}
 */

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------

function formatDate(raw) {
  if (!raw) return "";
  if (/^\d{1,2}\s[A-Za-z]{3}\s\d{4}$/.test(raw.trim())) return raw.trim();
  const months = ["Jan","Feb","Mar","Apr","May","Jun",
                  "Jul","Aug","Sep","Oct","Nov","Dec"];
  const d = new Date(raw);
  if (isNaN(d.getTime())) return raw;
  return d.getDate() + " " + months[d.getMonth()] + " " + d.getFullYear();
}

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function gedcomDate(raw) {
  if (!raw) return "";
  return formatDate(raw).toUpperCase();
}

// ---------------------------------------------------------------------------
// Google Drive storage
// ---------------------------------------------------------------------------

const DRIVE_FILE_NAME = "genealogy-research-assistant.json";

function parseSecret(secret) {
  if (!secret) throw new Error("No credentials found. Please configure the skill secret in settings.");
  try {
    const c = JSON.parse(secret);
    if (!c.client_id || !c.client_secret || !c.refresh_token) {
      throw new Error("Secret must be JSON with client_id, client_secret, and refresh_token.");
    }
    return c;
  } catch(e) {
    if (e.message.startsWith("Secret must")) throw e;
    throw new Error("Invalid secret format. Expected: {\"client_id\":\"...\",\"client_secret\":\"...\",\"refresh_token\":\"...\"}");
  }
}

async function getAccessToken(creds) {
  const resp = await fetch("https://oauth2.googleapis.com/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({
      client_id:     creds.client_id,
      client_secret: creds.client_secret,
      refresh_token: creds.refresh_token,
      grant_type:    "refresh_token"
    })
  });
  const json = await resp.json();
  if (!resp.ok) throw new Error("Failed to get access token: " + (json.error_description || json.error));
  return json.access_token;
}

async function findFileId(accessToken) {
  const q = encodeURIComponent("name='" + DRIVE_FILE_NAME + "' and trashed=false");
  const resp = await fetch(
    "https://www.googleapis.com/drive/v3/files?spaces=drive&q=" + q,
    { headers: { Authorization: "Bearer " + accessToken } }
  );
  const json = await resp.json();
  if (!resp.ok) throw new Error("Failed to search Drive: " + (json.error && json.error.message));
  return (json.files && json.files.length > 0) ? json.files[0].id : null;
}

async function readDriveData(accessToken) {
  const fileId = await findFileId(accessToken);
  if (!fileId) return { people: [], families: [] };
  const resp = await fetch(
    "https://www.googleapis.com/drive/v3/files/" + fileId + "?alt=media",
    { headers: { Authorization: "Bearer " + accessToken } }
  );
  if (!resp.ok) throw new Error("Failed to read Drive file.");
  return await resp.json();
}

async function writeDriveData(accessToken, data) {
  const content = JSON.stringify(data);
  const fileId  = await findFileId(accessToken);

  if (!fileId) {
    const boundary = "gd_boundary";
    const body = [
      "--" + boundary,
      "Content-Type: application/json",
      "",
      JSON.stringify({ name: DRIVE_FILE_NAME }),
      "--" + boundary,
      "Content-Type: application/json",
      "",
      content,
      "--" + boundary + "--"
    ].join("\r\n");
    const resp = await fetch(
      "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",
      {
        method: "POST",
        headers: {
          Authorization:  "Bearer " + accessToken,
          "Content-Type": "multipart/related; boundary=" + boundary
        },
        body: body
      }
    );
    if (!resp.ok) {
      const err = await resp.json();
      throw new Error("Failed to create Drive file: " + (err.error && err.error.message));
    }
  } else {
    const resp = await fetch(
      "https://www.googleapis.com/upload/drive/v3/files/" + fileId + "?uploadType=media",
      {
        method: "PATCH",
        headers: {
          Authorization:  "Bearer " + accessToken,
          "Content-Type": "application/json"
        },
        body: content
      }
    );
    if (!resp.ok) {
      const err = await resp.json();
      throw new Error("Failed to update Drive file: " + (err.error && err.error.message));
    }
  }
}

// ---------------------------------------------------------------------------
// Actions
// ---------------------------------------------------------------------------

async function recordPerson(data, accessToken) {
  const driveData = await readDriveData(accessToken);
  const key = ((data.given_name||"") + " " + (data.surname||"")).trim().toLowerCase();
  const idx = driveData.people.findIndex(p =>
    ((p.given_name||"") + " " + (p.surname||"")).trim().toLowerCase() === key
  );
  // Strip action key before storing
  const person = Object.assign({}, data);
  delete person.action;
  if (idx >= 0) driveData.people[idx] = person; else driveData.people.push(person);
  await writeDriveData(accessToken, driveData);

  const name = (data.given_name || "") + " " + (data.surname || "");
  let html = "<div style='font-family:serif;border:1px solid #888;padding:12px;max-width:400px;'>";
  html += "<h3 style='margin:0 0 8px 0;border-bottom:2px solid #333;padding-bottom:4px;'>" + escapeHtml(name.trim()) + "</h3>";
  html += "<table style='font-size:14px;width:100%;'>";
  if (data.birth_date || data.birth_place) {
    html += "<tr><td style='font-weight:bold;width:80px;'>Born:</td><td>" + escapeHtml(formatDate(data.birth_date));
    if (data.birth_place) html += " — " + escapeHtml(data.birth_place);
    html += "</td></tr>";
  }
  if (data.death_date || data.death_place) {
    html += "<tr><td style='font-weight:bold;'>Died:</td><td>" + escapeHtml(formatDate(data.death_date));
    if (data.death_place) html += " — " + escapeHtml(data.death_place);
    html += "</td></tr>";
  }
  if (data.gender) {
    const g = data.gender === "M" ? "Male" : data.gender === "F" ? "Female" : "Unknown";
    html += "<tr><td style='font-weight:bold;'>Gender:</td><td>" + g + "</td></tr>";
  }
  if (data.notes) {
    html += "<tr><td style='font-weight:bold;'>Notes:</td><td>" + escapeHtml(data.notes) + "</td></tr>";
  }
  html += "</table>";
  html += "<p style='margin:8px 0 0 0;font-size:11px;color:#080;'>Saved to Google Drive (" + driveData.people.length + " people stored).</p>";
  html += "</div>";
  return { result: html };
}

async function familyGroup(data, accessToken) {
  const driveData = await readDriveData(accessToken);

  // Save husband, wife, children as individual people too
  const family = Object.assign({}, data);
  delete family.action;
  function upsertPerson(p) {
    if (!p) return;
    const key = ((p.given_name||"") + " " + (p.surname||"")).trim().toLowerCase();
    const idx = driveData.people.findIndex(x =>
      ((x.given_name||"") + " " + (x.surname||"")).trim().toLowerCase() === key
    );
    if (idx >= 0) driveData.people[idx] = p; else driveData.people.push(p);
  }
  upsertPerson(data.husband);
  upsertPerson(data.wife);
  if (data.children) data.children.forEach(upsertPerson);

  const hname = data.husband ? ((data.husband.given_name||"") + " " + (data.husband.surname||"")).trim().toLowerCase() : "";
  const wname = data.wife    ? ((data.wife.given_name||"")    + " " + (data.wife.surname||"")).trim().toLowerCase()    : "";
  const fidx = driveData.families.findIndex(f => {
    const fh = f.husband ? ((f.husband.given_name||"") + " " + (f.husband.surname||"")).trim().toLowerCase() : "";
    const fw = f.wife    ? ((f.wife.given_name||"")    + " " + (f.wife.surname||"")).trim().toLowerCase()    : "";
    return fh === hname && fw === wname;
  });
  if (fidx >= 0) driveData.families[fidx] = family; else driveData.families.push(family);
  await writeDriveData(accessToken, driveData);

  let html = "<div style='font-family:serif;border:2px solid #444;padding:14px;max-width:520px;'>";
  html += "<h2 style='text-align:center;margin:0 0 10px 0;'>Family Group Sheet</h2>";

  function personBlock(label, p) {
    if (!p) return "";
    let s = "<h4 style='margin:8px 0 4px 0;border-bottom:1px solid #aaa;'>" + label + "</h4>";
    s += "<table style='font-size:13px;width:100%;'>";
    s += "<tr><td style='font-weight:bold;width:80px;'>Name:</td><td>" + escapeHtml((p.given_name||"") + " " + (p.surname||"")) + "</td></tr>";
    if (p.birth_date) s += "<tr><td style='font-weight:bold;'>Born:</td><td>" + escapeHtml(formatDate(p.birth_date)) + (p.birth_place ? " — " + escapeHtml(p.birth_place) : "") + "</td></tr>";
    if (p.death_date) s += "<tr><td style='font-weight:bold;'>Died:</td><td>" + escapeHtml(formatDate(p.death_date)) + (p.death_place ? " — " + escapeHtml(p.death_place) : "") + "</td></tr>";
    s += "</table>";
    return s;
  }

  html += personBlock("Husband", data.husband);
  html += personBlock("Wife", data.wife);

  if (data.marriage_date || data.marriage_place) {
    html += "<p style='font-size:13px;'><strong>Marriage:</strong> " + escapeHtml(formatDate(data.marriage_date));
    if (data.marriage_place) html += " — " + escapeHtml(data.marriage_place);
    html += "</p>";
  }

  if (data.children && data.children.length > 0) {
    html += "<h4 style='margin:10px 0 4px 0;border-bottom:1px solid #aaa;'>Children</h4>";
    html += "<ol style='font-size:13px;margin:4px 0;'>";
    data.children.forEach(function(c) {
      html += "<li>" + escapeHtml((c.given_name||"") + " " + (c.surname||""));
      if (c.birth_date) html += " — b. " + escapeHtml(formatDate(c.birth_date));
      if (c.gender) html += " (" + (c.gender === "M" ? "Male" : c.gender === "F" ? "Female" : c.gender) + ")";
      html += "</li>";
    });
    html += "</ol>";
  }

  html += "<p style='margin:8px 0 0 0;font-size:11px;color:#080;'>Saved to Google Drive (" + driveData.families.length + " families stored).</p>";
  html += "</div>";
  return { result: html };
}

function formatCitation(data) {
  let parts = [];
  if (data.author)           parts.push(escapeHtml(data.author));
  if (data.title)            parts.push('"' + escapeHtml(data.title) + '"');
  if (data.publication_info) parts.push(escapeHtml(data.publication_info));
  if (data.specific_item)    parts.push(escapeHtml(data.specific_item));
  if (data.repository)       parts.push(escapeHtml(data.repository));
  if (data.url)              parts.push(escapeHtml(data.url));
  if (data.date_accessed)    parts.push("accessed " + escapeHtml(formatDate(data.date_accessed)));

  const citation  = parts.join("; ") + ".";
  const typeLabel = (data.source_type || "source").replace(/_/g, " ");

  let html = "<div style='font-family:serif;border-left:4px solid #555;padding:8px 12px;max-width:500px;background:#fafaf5;'>";
  html += "<p style='margin:0 0 4px 0;font-size:11px;text-transform:uppercase;color:#666;'>" + escapeHtml(typeLabel) + "</p>";
  html += "<p style='margin:0;font-size:14px;'>" + citation + "</p>";
  html += "</div>";
  return { result: html };
}

function researchLog(data) {
  let html = "<div style='font-family:sans-serif;border:1px solid #bbb;padding:10px;max-width:500px;background:#fffff8;'>";
  html += "<h4 style='margin:0 0 6px 0;'>Research Log Entry</h4>";
  html += "<table style='font-size:13px;width:100%;border-collapse:collapse;'>";
  const rows = [
    ["Date",                data.date],
    ["Ancestor",            data.ancestor],
    ["Repository / Source", data.repository_or_source],
    ["Search Description",  data.description],
    ["Results",             data.results],
    ["Next Steps",          data.next_steps]
  ];
  rows.forEach(function(r) {
    if (r[1]) {
      html += "<tr><td style='font-weight:bold;vertical-align:top;padding:3px 8px 3px 0;width:130px;border-bottom:1px dotted #ddd;'>" + r[0] + "</td>";
      html += "<td style='padding:3px 0;border-bottom:1px dotted #ddd;'>" + escapeHtml(r[1]) + "</td></tr>";
    }
  });
  html += "</table></div>";
  return { result: html };
}

async function exportGedcom(accessToken) {
  const driveData = await readDriveData(accessToken);
  const people   = driveData.people   || [];
  const families = driveData.families || [];

  if (people.length === 0) {
    return { result: "<p style='font-family:sans-serif;color:#a00;'>No records found in Google Drive. Record some people first.</p>" };
  }

  let lines = [];
  lines.push("0 HEAD");
  lines.push("1 SOUR AI_Edge_Genealogy_Skill");
  lines.push("1 GEDC");
  lines.push("2 VERS 5.5.1");
  lines.push("2 FORM LINEAGE-LINKED");
  lines.push("1 CHAR UTF-8");

  let personId = 1;
  let familyId = 1;
  const idMap  = {};

  people.forEach(function(p) {
    const id = "@I" + personId + "@";
    idMap[((p.given_name||"") + " " + (p.surname||"")).trim()] = id;
    lines.push("0 " + id + " INDI");
    lines.push("1 NAME " + (p.given_name||"") + " /" + (p.surname||"") + "/");
    if (p.gender) lines.push("1 SEX " + p.gender);
    if (p.birth_date || p.birth_place) {
      lines.push("1 BIRT");
      if (p.birth_date)  lines.push("2 DATE " + gedcomDate(p.birth_date));
      if (p.birth_place) lines.push("2 PLAC " + p.birth_place);
    }
    if (p.death_date || p.death_place) {
      lines.push("1 DEAT");
      if (p.death_date)  lines.push("2 DATE " + gedcomDate(p.death_date));
      if (p.death_place) lines.push("2 PLAC " + p.death_place);
    }
    if (p.notes) lines.push("1 NOTE " + p.notes);
    personId++;
  });

  families.forEach(function(f) {
    lines.push("0 @F" + familyId + "@ FAM");
    if (f.husband) {
      const hname = ((f.husband.given_name||"") + " " + (f.husband.surname||"")).trim();
      if (idMap[hname]) lines.push("1 HUSB " + idMap[hname]);
    }
    if (f.wife) {
      const wname = ((f.wife.given_name||"") + " " + (f.wife.surname||"")).trim();
      if (idMap[wname]) lines.push("1 WIFE " + idMap[wname]);
    }
    if (f.marriage_date || f.marriage_place) {
      lines.push("1 MARR");
      if (f.marriage_date)  lines.push("2 DATE " + gedcomDate(f.marriage_date));
      if (f.marriage_place) lines.push("2 PLAC " + f.marriage_place);
    }
    if (f.children) {
      f.children.forEach(function(c) {
        const cname = ((c.given_name||"") + " " + (c.surname||"")).trim();
        if (idMap[cname]) lines.push("1 CHIL " + idMap[cname]);
      });
    }
    familyId++;
  });

  lines.push("0 TRLR");

  const gedcom = lines.join("\n");
  return { result: "<pre style='font-family:monospace;font-size:12px;background:#f4f4f0;padding:10px;border:1px solid #ccc;max-width:520px;overflow-x:auto;'>" + escapeHtml(gedcom) + "</pre>" };
}

async function listRecords(accessToken) {
  const driveData = await readDriveData(accessToken);
  const people    = driveData.people   || [];
  const families  = driveData.families || [];

  if (people.length === 0 && families.length === 0) {
    return { result: "<p style='font-family:sans-serif;'>No records saved yet.</p>" };
  }

  let html = "<div style='font-family:sans-serif;font-size:13px;max-width:480px;'>";
  if (people.length > 0) {
    html += "<h4 style='margin:0 0 6px 0;'>People (" + people.length + ")</h4><ul style='margin:0 0 10px 0;padding-left:18px;'>";
    people.forEach(function(p) {
      html += "<li>" + escapeHtml(((p.given_name||"") + " " + (p.surname||"")).trim());
      if (p.birth_date) html += " (b. " + escapeHtml(formatDate(p.birth_date)) + ")";
      html += "</li>";
    });
    html += "</ul>";
  }
  if (families.length > 0) {
    html += "<h4 style='margin:0 0 6px 0;'>Families (" + families.length + ")</h4><ul style='margin:0;padding-left:18px;'>";
    families.forEach(function(f) {
      const h = f.husband ? ((f.husband.given_name||"") + " " + (f.husband.surname||"")).trim() : "?";
      const w = f.wife    ? ((f.wife.given_name||"")    + " " + (f.wife.surname||"")).trim()    : "?";
      html += "<li>" + escapeHtml(h) + " &amp; " + escapeHtml(w);
      if (f.marriage_date) html += " (m. " + escapeHtml(formatDate(f.marriage_date)) + ")";
      html += "</li>";
    });
    html += "</ul>";
  }
  html += "</div>";
  return { result: html };
}

async function clearData(accessToken) {
  await writeDriveData(accessToken, { people: [], families: [] });
  return { result: "<p style='font-family:sans-serif;'>All saved records have been cleared from Google Drive.</p>" };
}

// ---------------------------------------------------------------------------
// Entry point — required by AI Edge Gallery
// ---------------------------------------------------------------------------

window.ai_edge_gallery_get_result = async function(dataStr, secret) {
  try {
    const data   = JSON.parse(dataStr);
    const action = data.action;

    // These actions don't need Drive
    if (action === "format_citation") return JSON.stringify(formatCitation(data));
    if (action === "research_log")    return JSON.stringify(researchLog(data));

    // All other actions require Drive credentials
    const creds       = parseSecret(secret);
    const accessToken = await getAccessToken(creds);

    switch (action) {
      case "record_person":  return JSON.stringify(await recordPerson(data, accessToken));
      case "family_group":   return JSON.stringify(await familyGroup(data, accessToken));
      case "export_gedcom":  return JSON.stringify(await exportGedcom(accessToken));
      case "list_records":   return JSON.stringify(await listRecords(accessToken));
      case "clear_data":     return JSON.stringify(await clearData(accessToken));
      default:
        return JSON.stringify({ result: "<p style='color:#a00;font-family:sans-serif;'>Unknown action: " + escapeHtml(action) + "</p>" });
    }
  } catch(e) {
    return JSON.stringify({ result: "<div style='font-family:sans-serif;border:1px solid #c00;padding:10px;max-width:480px;background:#fff5f5;'><strong>Error:</strong> " + escapeHtml(e.message) + "</div>" });
  }
};
</script>
</body>
</html>
